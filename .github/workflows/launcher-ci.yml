name: go-go-os-platform-ci

on:
  push:
    branches:
      - main
      - task/**
  pull_request:

jobs:
  frontend-platform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build frontend platform packages/apps
        run: npm run build

      - name: Run frontend tests
        run: npm run test

  backendhost-go-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-go-os/go.mod

      - name: Run backendhost tests
        working-directory: go-go-os
        run: go test ./...
